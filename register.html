 <!--Main Content-->
 <main>
	<section id="contact" class="py-5">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-6">
        <h2 class="fw-bold">Register To Submit Order</h2>
        <p class="text-muted">Fill in your details.</p>
        <p class="text-muted">Fields marked with <span class="text-danger">*</span> are required.</p>

        <form action="acknowledgements.html" method="get">
            
          <div class="mb-3">
           <label class="form-label">Full Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" placeholder="e.g. Yaone Mosige" required>
          </div>

          <div class="mb-3">
           <label class="form-label">Email <span class="text-danger">*</span></label>
            <input type="email" class="form-control" placeholder="e.g. mosigeyaone@email.com" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone <span class="text-danger">*</span></label>
            <input type="tel" class="form-control" placeholder="e.g. +267 7xxxxxxx" required> 
          </div>

          <div class="mb-3">
            <label class="form-label">
             Address <span class="text-danger">*</span>
           </label>
           <textarea class="form-control" rows="3" placeholder="e.g. Plot 1234, Gaborone, Botswana" required></textarea>
          </div>

          <div class="mb-3">
    <label class="form-label">Select Product <span class="text-danger">*</span></label>
    <select class="form-select" required>
    <option value="">Choose product</option>
    <option>Nude Gloss</option>
    <option>Rose Lipstick</option>
    <option>Lip Mask</option>
    <option>Lip Scrub</option>
  </select>
</div>
<div class="mb-3">
  <label class="form-label">Delivery Method <span class="text-danger">*</span></label>

  <div class="form-check">
    <input class="form-check-input" type="radio" name="delivery" required>
    <label class="form-check-label">Home Delivery</label>
  </div>

  <div class="form-check">
    <input class="form-check-input" type="radio" name="delivery" required>
    <label class="form-check-label">Store Pickup</label>
  </div>
</div>
          <button type="submit" class="btn btn-success">Submit Order</button>
          <button type="reset" class="btn btn-danger">Cancel</button>
        </form>
      </div>
      </div>
      </div>
      </section>

  </main>
