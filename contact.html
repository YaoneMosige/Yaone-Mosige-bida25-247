 <!--Main Content-->
 <main>
	<section id="contact" class="py-5">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-6">
        <h2 class="fw-bold">Reach out!</h2>
        <p class="text-muted">Fill in your details and we will contact you.</p>

        <form action="feedback.html" method="get">
          
          <div class="mb-3">
            <label class="form-label">Full Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" placeholder="e.g. Yaone Mosige" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email <span class="text-danger">*</span></label>
            <input type="email" class="form-control" placeholder="e.g. mosigeyaone@email.com" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone <span class="text-danger">*</span></label>
            <input type="tel" class="form-control" placeholder="e.g. +267 7xxxxxxx" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Message <span class="text-danger">*</span></label>
            <textarea class="form-control" rows="4" placeholder="Submit a question,Contact us for help."></textarea>
          </div>

          <button type="submit" class="btn btn-success">Submit </button>
          <button type="reset" class="btn btn-danger">Clear</button>
        </form>
      </div>
      </div>
      </div>
      </section>

  </main>
